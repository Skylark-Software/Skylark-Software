<svg xmlns="http://www.w3.org/2000/svg" width="380" height="90" viewBox="0 0 380 90">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Sora:wght@200;300;400&amp;display=swap');
    </style>
  </defs>

  <!-- Left ring -->
  <circle cx="28" cy="45" r="22" fill="none" stroke="#1e4268" stroke-width="0.75"/>
  <!-- Right ring -->
  <circle cx="44" cy="45" r="22" fill="none" stroke="#2a5888" stroke-width="0.75"/>
  <!-- Intersection arc -->
  <path d="M38,24 A22,22 0 0,1 38,66" fill="none" stroke="#4a90d8" stroke-width="1.4" stroke-linecap="round"/>

  <!-- Left ring major ticks (4) -->
  <line x1="28" y1="23" x2="28" y2="18" stroke="#2e5c8a" stroke-width="1.1" stroke-linecap="round" transform="rotate(0 28 45)"/>
  <line x1="28" y1="23" x2="28" y2="18" stroke="#2e5c8a" stroke-width="1.1" stroke-linecap="round" transform="rotate(90 28 45)"/>
  <line x1="28" y1="23" x2="28" y2="18" stroke="#2e5c8a" stroke-width="1.1" stroke-linecap="round" transform="rotate(180 28 45)"/>
  <line x1="28" y1="23" x2="28" y2="18" stroke="#2e5c8a" stroke-width="1.1" stroke-linecap="round" transform="rotate(270 28 45)"/>
  <!-- Left ring minor ticks -->
  <line x1="28" y1="23" x2="28" y2="21" stroke="#1e3a58" stroke-width="0.6" stroke-linecap="round" transform="rotate(45 28 45)"/>
  <line x1="28" y1="23" x2="28" y2="21" stroke="#1e3a58" stroke-width="0.6" stroke-linecap="round" transform="rotate(135 28 45)"/>
  <line x1="28" y1="23" x2="28" y2="21" stroke="#1e3a58" stroke-width="0.6" stroke-linecap="round" transform="rotate(225 28 45)"/>
  <line x1="28" y1="23" x2="28" y2="21" stroke="#1e3a58" stroke-width="0.6" stroke-linecap="round" transform="rotate(315 28 45)"/>

  <!-- Right ring ticks (6) -->
  <line x1="44" y1="23" x2="44" y2="18" stroke="#264e7a" stroke-width="0.85" stroke-linecap="round" transform="rotate(0 44 45)"/>
  <line x1="44" y1="23" x2="44" y2="18" stroke="#264e7a" stroke-width="0.85" stroke-linecap="round" transform="rotate(60 44 45)"/>
  <line x1="44" y1="23" x2="44" y2="18" stroke="#264e7a" stroke-width="0.85" stroke-linecap="round" transform="rotate(120 44 45)"/>
  <line x1="44" y1="23" x2="44" y2="18" stroke="#264e7a" stroke-width="0.85" stroke-linecap="round" transform="rotate(180 44 45)"/>
  <line x1="44" y1="23" x2="44" y2="18" stroke="#264e7a" stroke-width="0.85" stroke-linecap="round" transform="rotate(240 44 45)"/>
  <line x1="44" y1="23" x2="44" y2="18" stroke="#264e7a" stroke-width="0.85" stroke-linecap="round" transform="rotate(300 44 45)"/>

  <!-- Node -->
  <circle cx="38" cy="24" r="3" fill="none" stroke="#4a90d8" stroke-width="0.75"/>
  <circle cx="38" cy="24" r="1.5" fill="#5aaaf5"/>
  <circle cx="38" cy="24" r="0.6" fill="#cce8ff"/>

  <!-- Wordmark -->
  <text x="84" y="42" font-family="'Sora', 'Helvetica Neue', Arial, sans-serif" font-weight="300" font-size="27" fill="#d8eeff" letter-spacing="-0.3">BlueSky</text>
  <line x1="84" y1="51" x2="356" y2="51" stroke="#2a4a6a" stroke-width="0.5"/>
  <text x="85" y="64" font-family="'Sora', 'Helvetica Neue', Arial, sans-serif" font-weight="200" font-size="8" fill="#3a6088" letter-spacing="3.5">LIFE MANAGEMENT TOOLS</text>
</svg>
